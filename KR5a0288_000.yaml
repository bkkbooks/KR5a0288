front:
  text: 析疑指迷論序芥六神峰逍遙大師出示高論二編名曰析疑指迷清談不吝於胸懷奧妙發揮於翰墨平生所養於兹見矣幸緣一覽俾豫泠泠然獨立於通衢不知四肢之有無則可以墻塹玄門梯航後學者大德戊戌仲春朔汝南重玄子劉道真謹跋前火傳後火薪異而焰同今聖嗣古聖時殊而道一故宜乎馬談劉丘已來演玄風敷妙化之真人繼繼而出也神峰逍遙先生牛君練師新出奇論二卷曰曰析疑指迷屬余以文開卷一閲不覺身世兩忘若馭清飊而遊乎碧落矣其誘人也循循然有條而不紊使人惑志頓消而朗徹其進人也端語一發使人浩然長往而不留其言簡其理微其示教也深其用心也切此可謂火傳而聖繼者也門人恐其微言將沒裒而録之以禆後進其弘師之道如是此亦可謂用心之厚者焉時大德三年中秋前三日靜安沖漠道人王道亨書神峰逍遙子間居幽室倚軒塊坐隱几忘懷適有悟真子李志恆從座而起恭然而立携箋作禮拜而謂曰敢問全真妙理至道精微性命之義修行次序願師演而析疑矣逍遙子答曰夫至道精微無形無名難演難言非容取捨而可得也故心困焉而不能知口辟焉而不能辭在人虛府自悟耳其人叩之不已志之愈誠由是不得已而應命輒述是論名曰析疑指迷庶資初學之漸悟耳時元貞二年孟春上元日題析疑指迷論
