body:
  text: 析疑或問曰何謂全真答曰即爾之一念未萌之前也夫一念未萌等同太虛視之不見其色聽之不聞其聲摶之不得其形其上無蓋其下無底其傍無門其正無體其大無外其小無內杳冥莫測恍惚難明體之非有隨用不無隱大無外藏微有餘寂然不動感而遂通包含萬象體不挂一絲頭吾不知其名字之曰全真釋教謂之圓覺又云圓空太上所謂混成又云圓通故南華經云未始有物者至矣盡矣不可以加矣此之謂歟或問曰何謂心性答曰夫心性之義譬猶漚水水本至清有感漚起風浪渾濁不能鑑理風浪息時水澄漚止以此論之水即是漚漚即是水由是言之心即性用性即心體體用俱忘全真而已或問曰何謂性命對曰夫性命之理乃陰陽神氣之異名也夫神氣二字呼唤無窮今略言其大槩或謂動靜龍虎水火坎離東西南北春秋溫涼冬夏寒暑否泰窮通升降往來有無虛實上下浮沉高低深淺金木剛柔天地日月震兊昏明夫婦嬰姹金翁黃婆絳雪玄霜紫芽紅粉真鉛真汞其他殊名異呼不可窮極種種名相不可著止總名神氣而已夫欲全神養氣當明體用賔主屏盡萬緣一塵不染表裏清淨久久精誠自然氣結神凝性停命住性命雙全氣神為一一與道同功行圓畢或問曰何名體用賔主答曰若要修真須明體用賔主何謂也若不明體用者情欲不能遣也如未曉陰陽賔主則不能契於虛無之至神奚謂體用曰虛寂為體覺照為用體用兩全洞合道原曰何名賔主答曰前念為賔後念為主念起不著本無根緒故洞明真人云念頭起覺時休此一句體用賔主俱全也何謂俱全曰夫念頭起者為賔覺者是主主正為用休歇是體由是言之體即用也用即體也體用雙泯全真者也或問曰人多説傳命基其義如何答曰夫命者氣也基者本也一氣之本即道是也夫道者無形無名非容取捨而可得也取捨不容有何傳哉故關尹子曰聖人竟不能出道以示人又子列子云不知所以然而然謂之命此之謂歟或問曰祖師言五行不到處一氣未生前其義奚若應曰夫五行者乃吾之五識也一氣者即爾之一念也若五識不起處一念未萌前者即與向之所謂未始有物之義同也既未始有物者強名曰道矣或問曰且未始有物者謂道既已為物矣物中有道乎對曰夫物從道生物即是道亦猶心從性生心即是性又如漚從水生漚即是水也故洞明云師傳祕語悟心開物外家風物裏培又關尹子云天地成理一物包焉又云即一物中知天盡神致命造玄物既如此人豈不然又太上云有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道正謂此也或問曰清和真人有云止念降心越念多不降不止逐浪隨波如何即是答曰凡初學道者必先悟其真心夫真心者元無一物等同太虛本來清淨於此淨中一念忽起頓然回光返本歸元則湛然清淨矣故經云澄其心而神自清自然六欲不生三毒消滅既得三毒消滅即合於道矣若不明此理者一念既起又起念降之降之不下生心遣之降遣不已還自纏縛若不降遣縱欲昏迷轉不相應故常知常覺還自把捉不知不覺透入别殼亦與託生的一般也直待報盡方歸馬乏人困終不悟矣豈不悲哉或問曰如何得萬法圓通答曰修行之士必先明心悟性然後絶疑方能養道夫心者是萬法之源性者是群經之要故心生則種種法生心滅則種種法滅若一念不生即脫生死向這一念不生處即見本來面目也久久涵養圓明光大則無法不通無經不解此名法眼圓通矣至如一大藏經只是説這些理趣也古今聖賢所得者得此而已過去師真所演者演此而已五祖七真所了者了此而已奉勸同流若能悟此更莫狐疑斯為學道樞機正是修真之祕訣或問曰昔神光大師向達磨祖師前求安心之法祖師答云將汝心來吾與汝安神光良久曰弟子覓心無所得祖師曰吾與汝安心已竟矣其神光言下大悟絶疑矣其理何如對曰夫心本無心心因物感而見故紫陽云見物便見心無物心不見十方通塞中真心無不遍夫真心無象喻如寶鑑含輝若物來則見物人來則見人人物俱泯則圓明瑩徹矣如是言之覓心無所得也關尹子云衆人之權歸於惡賢人之權歸於善聖人之權歸於無所得唯無所得者所以為道既是悟道者豈不絶疑哉或問曰長春真人云不有神仙福難明造化機何名造化機答曰夫造化者乃陰陽否泰之異名也陰陽機要即道之别稱也夫否者塞也泰者通也故化書云是以古聖人窮通塞之端得造化之源造化之源者即妙道而已矣理既如此不有神仙福安能明道哉或問曰道雖無方學則有序何謂有序應曰凡初學道者必先拋棄塵緣屏除愛欲遍訪明師究研妙理妙理精明更要端的志節次須明戒定慧三者此序進之要妙也夫戒者是上天之梯凳渡苦海之舟航陟道之初基乃修仙之漸路也若無戒則不能入於定門也不入定門者無由發於慧也故莊子云虛室生白吉祥止止又云宇泰定者發乎天光天光若發則與道同其源矣與道同則鬼神難以測度陰陽不能陶鑄陶鑄不得者至人哉至人哉或問曰出家修道又言道本無修其意何如對曰夫道本無修心即有鍊夫道之在人如金在礦礦內有金不鍊而為石石若鍊去即名為金既已為金不復為礦也人中有道不鍊而為凡凡心鍊盡即名為仙既已為仙不復為凡也若已為金不須鍛鍊既成仙道復何修哉或問曰丹陽真人云速把我人山放倒急將龍虎穴衝開其義何如應曰若我人山放倒則龍虎穴便開也何謂也夫我者心即是也人者境即是也若心境兩忘則人我山倒矣夫龍虎者即人動靜生滅之心也生滅之心始於真空之性真空之性寥廓虛寂故名謂穴也又云虛府也太上所謂衆妙之門又云玄牝之門矣又莊子名謂天府此乃龍虎穴之義也云衝開者是無遮障之貌既無遮障者即道藴於此矣或問曰如何是金丹答曰夫金者喻如曾經鍛鍊真堅剛利明白瑩素也丹者譬若圓成光大環樞應變反覆無窮於本末端倪也丹之為義若人服之定超生死之病矣故曰金丹也或問曰凡初修鍊必須減飯除情戰睡又云飢來喫飯困時睡其理何如答曰其理兩説一者初心進道熟境難忘馬猿易動所以衣食睡欲不教如意古人云學道休望如意如意休望學道又云飽暖生淫欲飢寒守自然若以塵心絶盡道眼衝開則無為而無不為也無為而無不為者又豈妨於飯食睡眠也哉或問曰離峰真人云有體亦是病無體亦是病有無俱不用何處安身命其理奚若答曰有體則著於色相無體則滯於頑空有無俱不用則落於漭蕩矣曰如何出得三重障礙去答曰二邊俱不立中道亦非安回首二乘外靈光射廣寒指迷廣漠先生間居於丈室恬然而宴坐淡漠而忘懷委蛇而自適任運而逍遙恣放情於自得之鄉矣時有昭然子越坐而起恭然而稽首立侍乎前曰弟子得為役久矣未獲夫子傳吾妙道而已今日宴間敢問其道若何廣漠先生移位近前默然良久動容有間仰天而笑曰道奚傳哉昭然子曰夫子勿稽弟子終願聞之廣漠先生曰道本無問問亦無答才涉有言即墮於第二義也故曰道不可傳傳而非也視之不見聽之不聞摶之不得思之不知瞻之在前忽焉在後是謂無狀之狀無物之象是謂惚恍恍兮惚兮其中有物窈兮冥兮其中有精其精甚真其中有信自古及今獨立而不改周行而不殆可以為天下母吾不知其名字之曰道故心困焉而不能知口辟焉而不能辭在人靈府自悟耳昭然子曰道既無傳弟子嘗聞道家者祖宗遞授師資相承遞授相承箇什麼答曰遞授玄教相承妙法也曰玄教妙法而亦有道否答曰不即不離譬猶筌蹄也夫筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言矣安得夫忘言之人而與言哉夫忘言之人者言無言絡日言而未嘗言為無為絡日為而未嘗為也故曰無言而無所不言無為而無所不為矣昭然子曰未得魚兔必用筌蹄不能悟意須假言教惟願夫子慈愍少垂微言發吾之覆也於是再拜稽首曲躬而立廣漠先生曰居吾語汝夫道無後先而教有頓漸人性有利鈍而悟有淺深稟氣不同而賢愚有異循之於本也咸始於道矣故曰異途而同歸也夫頓悟之者不假修持則直超彼岸立證無生矣而後眼如耳耳如鼻鼻如口口無不同也心凝形釋骨肉都融而能反山川移城邑蹈水火入金石縱橫無礙而變化無方者也夫漸悟之者先要明其心悟其性而後養其命也次須纍其功積其行而以歲月求之也歲之深也月之久也而造次必於是顛沛必於是行住必於是坐卧必於是綿綿若存用之不勤如是無間鍛鍊功著也而形如稿木心類寒灰窈窈之中獨見曉焉冥冥之內獨聞和焉而得體合於心心合於氣氣合於神神合於無也而能攝乾坤於掌上摶曰月於襟前捲舒八景聚散三辰出有入無存亡白在而陰陽不能測矣昭然子曰頓漸之理敬聞命矣敢問心性之義若何弟子性鈍願夫子細細釋之廣漠先生曰嘻愚矣子之難悟也且若問吾者心也吾答若者亦心也心之與心有何異哉又奚問乎亦奚説哉若之問也吾之答也總屬妄心妄心滅處而不知其誰何故曰未始出吾宗宗者性也性稟於道道稟於自然矣曰心性之義敬聞命矣敢問養命之理而有為乎無為乎奚若答曰而無為乎無為而無不為也故曰為者敗之執者失之是以聖人無為故無敗無執故無失也曰既是無為者過去師真而謂曰減飯也戰睡也擒猿而捉馬也薄滋味而愼言也而似有為乎其理何如答曰夫道本無為也而心即有鍊也鍊者損也損其舊習而新染也損之又損之以至於無為無為而無不為也故曰為無為則無不治矣夫無為可以養命也曰命者何謂也答曰即混元真氣也故曰物受之謂命天賦之謂性率性之謂道又曰不知所以然而然謂之命此之謂歟昭然子曰古云不知命無以為君子此云不知所以然而然謂之命是兩也而不同乎答曰而言異而理同也夫不知命無以為君子者謂不知守其命分也分外貪生而失其本者非君子也夫人以精為根以命為本以性為宗命者氣也性者神也夫神氣精三者咸原於一而未嘗離也而離之者皆越於分也曰何謂越分答曰夫人性分無欠無餘本來具足凡養生之物皆是不得已而為之夫不得已之類可為無心矣無心而可以養命也人而不知此理心慕於妄緣而以為其預謀積聚而以為久恣縱於驕淫之地流蕩於名利之場往而不返迷而不悟豈能為君子哉昭然子曰夫精氣神未分則不問既已分矣奚復為一邪答曰夫三者分離皆因其有心也心之所之則氣從之氣之所之則形應之是故心感於外者感於悲則淚出感於辛則涕出感於燥則汗出感於酸則液出是故感於淫則精出也人能寧心於虛極之鄉息慮於無為之域則寂然不動感而遂通而心不動也而精白祕也精化為氣氣化為神神化為虛虛實相通是謂大同大同而無所同也而無所不同矣昭然子曰養命之理敬聞命矣敢問鍊丹之要亦可得而聞乎廣漠先生曰鍊丹之要法有多門而有邪正亦有大小不同也曰奚謂邪答曰有鍊五金者八石者有採日精而月華者有吞霞而服氣者有採戰而閉精者或服水火而還元者吐故而納新者按摩而數息者熊經而鳥伸者搖筋而擺髓者咽津而納氣者守下丹田而明堂者默朝上帝而運氣者倒卓崑崙而偃黃河者肘後飛金精而存想者休糧而辟穀者服餌而延形者向之所謂法有多門而不能盡述也略言數端皆是小乘之邪法也於戲多迷於傍門而不能悟其真道矣所以學道者如牛毛而了道者若麟角也曰何由如是之寡也曰皆為不遭遇於真師之所訣而被邪師之所惑以致於白執固而不悟也故曰大迷者絡身不反大愚者絡身不靈也所謂冰不可鏤愚不可賢此固然矣故正陽頌云妙法三千六百門學人各執一為根可憐些子神仙法不在三千六百門又云神仙見汝太頑愚留下丹經萬卷餘句句章章皆譬喻元來真道不關書正謂此也於是昭然子再拜而起稽首而立曰正鍊丹之法若何先生答曰夫正鍊丹之法者而有三門上中下而分為九品上三品中三品下三品而神亦有三名太上者虛無之神天地者陰陽之神人蟲者血肉之神也而仙亦有九品有虛無之仙天仙地仙神仙鬼仙山仙水仙人仙物仙是為九品也夫虛無之仙不可論也故天仙不離於天地仙不離於地神仙不離於神鬼仙不離于鬼山仙不離於山水仙不離於水人仙不離於人物仙不離於物也夫原其所始本無三九之分也為其悟有深淺稟有清濁而功有多寡故有如是之異也曰上乘鍊丹者若何答曰夫上乘上品鍊丹者以太虛為罏以真空為鼎以圓明為藥物以天光為進火以妄情為滲漏以爭為防危以清淨為沐浴以無為為外護以恍惚為抽添以不染為革穢也而得之於一息之間而了在於百日之內矣曰中乘鍊丹者何如答曰夫中乘上品鍊丹者以乾坤為罏以陰陽為鼎以真鉛真汞為藥物以純陽為進火以欲念為滲漏以不昧為防危以消灑為沐浴以柔弱為外護以定慧為抽添以忘機為革穢也而得在於百日之中而了在於三年之外矣曰下乘鍊丹者若何答曰下乘上品鍊丹者以身為罏以心為鼎以神氣為藥物以覺照為進火以逐境為滲漏以不睡為防危以滌慮為沐浴以謙和為外護以升降為抽添以純素為革穢也而得之於三年之內而了在於九載之中矣夫下乘下品鍊丹者亦以身為罏以五臟六腑為鼎以精血為藥物以運氣為進火以精泄為滲漏以節飲為防危以潄津為沐浴以修善為外護以導引為抽添以不淫為革穢也而終年無成而修之於纍世矣此可以延年而不能出離輪回耳雖然比於誣善之人亦雲泥有間矣昭然子曰鍊丹之理敬聞命矣敢問清淨經云能悟之者可傳聖道乎於是廣漠先生放下拂子斂身而卧良久曰會麼昭然子於言下大悟踊躍而喜怡然而笑遂禮三拜稽首立侍乎傍廣漠先生蹙然而起曰子見箇什麼道理而便拜乎昭然子曰夫子是何道理之有哉廣漠先生曰如是如是子善護持矣頌曰本來無説亦無傳只為學人酷殢筌若會其中端的意寒潭秋月冷沉淵析疑指迷論終
